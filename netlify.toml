[build]
  command = "npm run build"
  publish = "dist"

# Single-page-app fallback: every unknown URL serves index.html so React Router
# can take over.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache hashed assets, never cache the HTML shell.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
